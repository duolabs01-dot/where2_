<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Where2?</title>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
      :root {
        /* Default Theme (Neutral/Purple - iOS Glass) */
        --color-background: #000000;
        --color-surface: #121212;
        --color-primary: #9F50FF;
        --color-primary-dark: #8B3FF7;
        --color-secondary: #10B981;
        --color-status-red: #FF4444;
        --color-warning: #FFB020;
        --color-text-main: #ffffff;

        /* Glow Tokens (Default) */
        --glow-core: #9F50FF;
        --glow-bloom: rgba(159, 80, 255, 0.6);
        --glow-reflection: rgba(159, 80, 255, 0.15);
        
        /* Layout Safe Areas */
        --bottom-nav-h: 92px;
      }

      /* Matrix Theme Override */
      html.theme-matrix {
        --color-background: #000500;
        --color-surface: #001400;
        --color-primary: #00FF41;
        --color-primary-dark: #00CF35;
        --color-secondary: #39FF14;
        --color-status-red: #FF3333;
        --color-warning: #ADFF2F;
        --color-text-main: #E0FFE0;

        /* Glow Tokens (Matrix) */
        --glow-core: #00FF41;
        --glow-bloom: rgba(0, 255, 65, 0.6);
        --glow-reflection: rgba(0, 255, 65, 0.2);
      }

      /* Neo Theme Override (Futuristic/Holo) */
      html.theme-neo {
        --color-background: #02040A;
        --color-surface: #0B0E17;
        --color-primary: #00F0FF; /* Cyan */
        --color-primary-dark: #00C0CC;
        --color-secondary: #D946EF; /* Magenta */
        --color-status-red: #FF2A6D;
        --color-warning: #FEE75C;
        --color-text-main: #E0F7FA;

        /* Glow Tokens (Neo) */
        --glow-core: #00F0FF;
        --glow-bloom: rgba(0, 240, 255, 0.5);
        --glow-reflection: rgba(217, 70, 239, 0.25);
      }

      body { 
        background-color: var(--color-background); 
        color: var(--color-text-main); 
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior-y: none; /* Prevent pull-to-refresh on body */
        /* Smooth theme transition for colors */
        transition: background-color 0.6s cubic-bezier(0.2, 0.8, 0.2, 1), 
                    color 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      
      /* Safe Area Utilities */
      .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
      .pt-safe { padding-top: env(safe-area-inset-top); }
      .bottom-safe { bottom: env(safe-area-inset-bottom); }
      
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      /* Global Bottom Nav Safe Padding for Scrollable Areas */
      .main-scroll-host .overflow-y-auto {
        padding-bottom: calc(var(--bottom-nav-h) + env(safe-area-inset-bottom)) !important;
      }
      
      /* Base Liquid Glass Utility */
      .liquid-glass {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
      }
      
      html.theme-matrix .liquid-glass {
        background: rgba(0, 20, 0, 0.4);
        border: 1px solid rgba(0, 255, 65, 0.1);
      }

      html.theme-neo .liquid-glass {
        background: rgba(5, 10, 30, 0.4);
        border: 1px solid rgba(0, 240, 255, 0.15);
        box-shadow: 0 8px 32px 0 rgba(0, 240, 255, 0.05);
      }

      /* Safari-Specific Fixes for Glassmorphism */
      .ios-backdrop {
        -webkit-backdrop-filter: blur(16px);
        backdrop-filter: blur(16px);
        background: rgba(0, 0, 0, 0.15);
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }

      /* iOS animation effects */
      @keyframes ios-spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      @keyframes ios-spin-slow {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }

      .animate-spin-slow {
        animation: ios-spin-slow 4s linear infinite;
      }
      
      /* Performance: Native Browser Virtualization */
      .virtual-item {
        content-visibility: auto;
        contain-intrinsic-size: 0 300px;
      }
      
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .filled-icon { font-variation-settings: 'FILL' 1; }
      
      /* Map Fixes */
      .leaflet-container { width: 100%; height: 100%; background: var(--color-background); }
      .leaflet-control-attribution { display: none; }
      
      /* Marker Animation Class */
      .marker-bounce-enter {
        animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards;
        transform-origin: bottom center;
      }

      /* Ensure CSS vars update smoothly on theme change */
      * {
        transition-property: background-color, border-color, color, fill, stroke, box-shadow;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
        transition-duration: 300ms;
      }

      @keyframes shimmer {
        0% { background-position: -1000px 0; }
        100% { background-position: 1000px 0; }
      }
      .animate-shimmer {
        animation: shimmer 2s linear infinite;
        background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.05) 50%, transparent 100%);
        background-size: 1000px 100%;
      }
      
      @keyframes bounceIn {
        0% { transform: scale(0) translateY(-20px); opacity: 0; }
        60% { transform: scale(1.1) translateY(0); opacity: 1; }
        100% { transform: scale(1) translateY(0); opacity: 1; }
      }
    </style>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              background: "var(--color-background)", 
              surface: "var(--color-surface)",
              primary: "var(--color-primary)", 
              "primary-dark": "var(--color-primary-dark)",
              secondary: "var(--color-secondary)",
              "status-red": "var(--color-status-red)", 
              warning: "var(--color-warning)",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"],
              "body": ["Spline Sans", "sans-serif"]
            },
            boxShadow: {
              'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.37)',
              'glass-inset': 'inset 0 1px 0 0 rgba(255, 255, 255, 0.1)',
              'neon': '0 0 20px rgba(159, 80, 255, 0.4)',
            },
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'shimmer': 'shimmer 2s linear infinite',
              'bounce-in': 'bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards',
              'spin-slow': 'spin 3s linear infinite',
            },
            keyframes: {
              shimmer: {
                '0%': { backgroundPosition: '-1000px 0' },
                '100%': { backgroundPosition: '1000px 0' },
              },
              bounceIn: {
                '0%': { transform: 'scale(0) translateY(-20px)', opacity: '0' },
                '60%': { transform: 'scale(1.1) translateY(0)', opacity: '1' },
                '100%': { transform: 'scale(1) translateY(0)', opacity: '1' },
              },
            }
          },
        },
      }
    </script>
